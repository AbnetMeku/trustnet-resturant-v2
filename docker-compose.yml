services:
  postgres:
    image: postgres:16-alpine
    container_name: trustnet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5454:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  inventory:
    image: ghcr.io/abnetmeku/trustnet-resturant-v2-backend:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: trustnet-inventory
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    command: ["/app/docker/backend/start_inventory.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5001"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 5001)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    image: ghcr.io/abnetmeku/trustnet-resturant-v2-backend:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: trustnet-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      INVENTORY_BASE_URL: http://inventory:5001
      DATABASE_URI: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      inventory:
        condition: service_healthy
    ports:
      - "5050:5050"
    volumes:
      - branding_data:/app/app/static/branding
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 5050)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  cloud-sync-agent:
    image: ghcr.io/abnetmeku/trustnet-resturant-v2-backend:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: trustnet-cloud-sync-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DATABASE_URI: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      DISABLE_INVENTORY_OUTBOX_WORKER: "true"
    command: ["/app/docker/backend/start_cloud_sync.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    image: ghcr.io/abnetmeku/trustnet-resturant-v2-frontend:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: trustnet-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      inventory:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres_data:
  branding_data:
